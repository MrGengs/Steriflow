<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#0a0a1a" />
  <title>SteriFlow — History</title>
  <link rel="icon" type="image/png" href="assets/logo.png" />
  <link rel="apple-touch-icon" href="assets/logo.png" />
  <link rel="stylesheet" href="assets/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<script src="js/theme.js"></script>
</head>
<body>

<!-- ── Animated Background ──────────────────────────────────── -->
<div class="bg-canvas">
  <div class="bg-orb o1"></div>
  <div class="bg-orb o2"></div>
  <div class="bg-orb o3"></div>
  <div class="bg-orb o4"></div>
  <div class="bg-mesh"></div>
  <div class="bg-noise"></div>
</div>

<div class="page-wrapper">

  <!-- Header -->
  <header class="app-header fade-in">
    <div class="header-brand">
      <div class="header-logo">
        <img src="assets/logo.png" alt="SteriFlow" width="36" height="36" style="border-radius:6px" />
      </div>
      <div>
        <div class="header-page-title">Sterilization Log</div>
        <div class="header-subtitle">Activity history</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="exportBtn" aria-label="Export">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
      </button>
      <button class="icon-btn" id="notifBtn" aria-label="Notifications">
        <span class="notif-dot" id="notifDot"></span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
      </button>
    </div>
  </header>

  <div class="content">

    <!-- Filter Chips -->
    <div class="filter-row fade-in">
      <div class="chip active" data-filter="all">All</div>
      <div class="chip" data-filter="today">Today</div>
      <div class="chip" data-filter="week">This Week</div>
      <div class="chip" data-filter="month">This Month</div>
    </div>

    <!-- Summary Stats -->
    <div class="stats-row mt-12 fade-in fade-in-delay-1">
      <div class="glass summary-card">
        <div class="summary-value" style="color:var(--accent);" id="totalCycles">—</div>
        <div class="summary-label">Total Cycles</div>
      </div>
      <div class="glass summary-card">
        <div class="summary-value" style="color:var(--accent2);" id="avgDuration">—</div>
        <div class="summary-label">Avg Duration</div>
      </div>
      <div class="glass summary-card">
        <div class="summary-value" style="color:#27c76a;" id="cleanRate">—</div>
        <div class="summary-label">Clean Rate</div>
      </div>
    </div>

    <!-- History Table -->
    <div class="glass card-p mt-12 fade-in fade-in-delay-2">
      <div class="flex items-center justify-between mb-12">
        <div class="section-title" style="margin-bottom:0;">Cycle Records</div>
        <div style="font-size:0.68rem;color:var(--text-dim);" id="recordCount">Loading...</div>
      </div>

      <div style="overflow-x:auto;">
        <table class="history-table" id="historyTable">
          <thead>
            <tr>
              <th>Date</th>
              <th>Time</th>
              <th>Duration</th>
              <th>Result</th>
            </tr>
          </thead>
          <tbody id="historyBody">
            <tr><td colspan="4" style="text-align:center;color:var(--text-dim);padding:24px 0;">Loading history...</td></tr>
          </tbody>
        </table>
      </div>

      <!-- Showing up to 50 most recent records -->
    </div>

    <!-- Contamination Breakdown -->
    <div class="glass card-p mt-12 fade-in fade-in-delay-3">
      <div class="section-title">Detection Breakdown</div>
      <div style="display:flex;flex-direction:column;gap:8px;" id="breakdownList">
        <div style="text-align:center;color:var(--text-dim);font-size:0.78rem;padding:12px 0;">Loading...</div>
      </div>
    </div>

    <!-- Success Rate Card -->
    <div class="glass card-p mt-12 fade-in fade-in-delay-4">
      <div class="section-title">Cycle Success Rate</div>
      <div class="flex items-center gap-16">
        <div style="width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:3px solid var(--glass-border);position:relative;" id="rateRing">
          <span style="font-family:'Sora',sans-serif;font-size:1.3rem;font-weight:700;color:#27c76a;" id="ratePercent">—</span>
        </div>
        <div style="flex:1;">
          <div style="display:flex;flex-direction:column;gap:8px;font-size:0.78rem;">
            <div class="flex justify-between">
              <div class="flex items-center gap-6">
                <span style="width:8px;height:8px;border-radius:50%;background:#27c76a;display:inline-block;"></span>
                Sterilized
              </div>
              <span style="font-weight:600;" id="sterilizedCount">—</span>
            </div>
            <div class="flex justify-between">
              <div class="flex items-center gap-6">
                <span style="width:8px;height:8px;border-radius:50%;background:var(--accent4);display:inline-block;"></span>
                Skipped
              </div>
              <span style="font-weight:600;" id="skippedCount">—</span>
            </div>
            <div class="flex justify-between" style="padding-top:4px;border-top:1px solid var(--glass-border);">
              <span style="color:var(--text-dim);">Total</span>
              <span style="font-weight:700;" id="totalCount">—</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div style="height:12px;"></div>

  </div><!-- /content -->

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <div class="nav-inner">
      <a href="dashboard.html" class="nav-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
        Home
      </a>
      <a href="monitoring.html" class="nav-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Monitor
      </a>
      <a href="ai-detection.html" class="nav-fab" title="AI Detection">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </a>
      <a href="history.html" class="nav-item active">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        History
      </a>
      <a href="account.html" class="nav-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a6 6 0 0 1 6-6h4a6 6 0 0 1 6 6v1"/></svg>
        Account
      </a>
    </div>
  </nav>

</div>

<script type="module" src="js/auth.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.7.3/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.7.3/firebase-auth.js";
import {
  getFirestore, collection, query, where, orderBy, getDocs, limit as firestoreLimit
} from "https://www.gstatic.com/firebasejs/11.7.3/firebase-firestore.js";
import { firebaseConfig } from "./js/firebase-config.js";

let app;
try { app = initializeApp(firebaseConfig); } catch(e) {
  const { getApp } = await import("https://www.gstatic.com/firebasejs/11.7.3/firebase-app.js");
  app = getApp();
}
const auth = getAuth(app);
const db = getFirestore(app);

let allLogs = [];
let currentFilter = 'all';

onAuthStateChanged(auth, async (user) => {
  if (!user) return;
  await loadAndRender();

  // Filter chips
  document.querySelectorAll('.chip[data-filter]').forEach(chip => {
    chip.addEventListener('click', async () => {
      document.querySelectorAll('.chip[data-filter]').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      currentFilter = chip.dataset.filter;
      renderHistory();
    });
  });
});

async function loadAndRender() {
  const user = auth.currentUser;
  if (!user) return;

  try {
    const q = query(
      collection(db, 'users', user.uid, 'sterilization_logs'),
      orderBy('createdAt', 'desc'),
      firestoreLimit(100)
    );
    const snapshot = await getDocs(q);
    allLogs = [];
    snapshot.forEach(doc => {
      const data = doc.data();
      const date = data.createdAt?.toDate?.() || new Date();
      allLogs.push({ id: doc.id, ...data, date });
    });
  } catch (e) {
    console.error('Failed to load history:', e);
  }

  renderHistory();
}

function filterLogs() {
  const now = new Date();
  return allLogs.filter(log => {
    if (currentFilter === 'today') return log.date.toDateString() === now.toDateString();
    if (currentFilter === 'week') return log.date > new Date(now.getTime() - 7*24*60*60*1000);
    if (currentFilter === 'month') return log.date.getMonth() === now.getMonth() && log.date.getFullYear() === now.getFullYear();
    return true;
  });
}

function renderHistory() {
  const logs = filterLogs();
  const tbody = document.getElementById('historyBody');
  const recordCount = document.getElementById('recordCount');
  const totalCycles = document.getElementById('totalCycles');
  const avgDuration = document.getElementById('avgDuration');
  const cleanRate = document.getElementById('cleanRate');

  // Summary
  const total = logs.length;
  totalCycles.textContent = total;
  recordCount.textContent = total + ' total';

  if (total > 0) {
    const totalDur = logs.reduce((s, l) => s + (l.durationMinutes || 0), 0);
    const avg = Math.round(totalDur / total);
    avgDuration.innerHTML = avg + '<span style="font-size:0.8rem;font-weight:500;">m</span>';

    const sterilized = logs.filter(l => l.status === 'Sterilized').length;
    const rate = Math.round((sterilized / total) * 100);
    cleanRate.innerHTML = rate + '<span style="font-size:0.85rem;font-weight:500;">%</span>';
  } else {
    avgDuration.textContent = '—';
    cleanRate.textContent = '—';
  }

  // Table
  if (total === 0) {
    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--text-dim);padding:24px 0;">No sterilization records found.</td></tr>';
    renderBreakdown([]);
    renderSuccessRate([]);
    return;
  }

  tbody.innerHTML = logs.map(log => {
    const d = log.date;
    const dateStr = d.toLocaleDateString('en-US', { day: 'numeric', month: 'short' });
    const timeStr = d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    const dur = (log.durationMinutes || 0) + ' min';

    let badge = '';
    if (log.status === 'Sterilized') {
      badge = '<span class="badge badge-done" style="font-size:0.62rem;padding:3px 10px;">Sterilized</span>';
    } else if (log.status === 'Skipped') {
      badge = '<span class="badge badge-moderate" style="font-size:0.62rem;padding:3px 10px;">Skipped</span>';
    } else {
      badge = '<span class="badge badge-dirty" style="font-size:0.62rem;padding:3px 10px;">' + (log.status || 'Unknown') + '</span>';
    }

    return `<tr><td>${dateStr}</td><td>${timeStr}</td><td>${dur}</td><td>${badge}</td></tr>`;
  }).join('');

  renderBreakdown(logs);
  renderSuccessRate(logs);
}

function renderBreakdown(logs) {
  const el = document.getElementById('breakdownList');
  if (!el) return;

  if (logs.length === 0) {
    el.innerHTML = '<div style="text-align:center;color:var(--text-dim);font-size:0.78rem;padding:12px 0;">No data</div>';
    return;
  }

  const clean = logs.filter(l => l.classification === 'Clean').length;
  const moderate = logs.filter(l => l.classification === 'Moderate').length;
  const dirty = logs.filter(l => l.classification === 'Dirty').length;
  const total = logs.length;

  const items = [
    { label: 'Clean', count: clean, color: 'var(--accent2)', pct: Math.round((clean/total)*100) },
    { label: 'Moderate', count: moderate, color: 'var(--accent4)', pct: Math.round((moderate/total)*100) },
    { label: 'Dirty', count: dirty, color: 'var(--accent3)', pct: Math.round((dirty/total)*100) }
  ];

  el.innerHTML = items.map(i => `
    <div class="progress-wrap">
      <div class="progress-header">
        <div class="flex items-center gap-6">
          <span style="width:8px;height:8px;border-radius:50%;background:${i.color};display:inline-block;"></span>
          <span>${i.label}</span>
        </div>
        <span style="font-weight:600;color:${i.color};">${i.count} (${i.pct}%)</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" style="width:${i.pct}%;background:${i.color};"></div>
      </div>
    </div>
  `).join('');
}

function renderSuccessRate(logs) {
  const ratePercent = document.getElementById('ratePercent');
  const sterilizedCount = document.getElementById('sterilizedCount');
  const skippedCount = document.getElementById('skippedCount');
  const totalCount = document.getElementById('totalCount');
  const rateRing = document.getElementById('rateRing');

  if (!ratePercent) return;

  const total = logs.length;
  const sterilized = logs.filter(l => l.status === 'Sterilized').length;
  const skipped = logs.filter(l => l.status === 'Skipped').length;
  const rate = total > 0 ? Math.round((sterilized / total) * 100) : 0;

  ratePercent.textContent = total > 0 ? rate + '%' : '—';
  sterilizedCount.textContent = sterilized + ' cycles';
  skippedCount.textContent = skipped + ' cycles';
  totalCount.textContent = total + ' cycles';

  if (rateRing && total > 0) {
    rateRing.style.borderColor = rate > 80 ? '#27c76a' : rate > 50 ? 'var(--accent4)' : 'var(--accent3)';
    ratePercent.style.color = rate > 80 ? '#27c76a' : rate > 50 ? 'var(--accent4)' : 'var(--accent3)';
  }
}
</script>
<script src="js/app.js"></script>
</body>
</html>
