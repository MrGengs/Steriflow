<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SteriFlow — Login</title>
  <link rel="icon" type="image/png" href="assets/logo.png" />
  <link rel="apple-touch-icon" href="assets/logo.png" />
  <link rel="stylesheet" href="assets/auth.css" />
</head>
<body>

  <!-- Animated Background -->
  <div class="auth-bg" aria-hidden="true">
    <div class="auth-orb auth-orb-1"></div>
    <div class="auth-orb auth-orb-2"></div>
    <div class="auth-orb auth-orb-3"></div>
  </div>

  <div class="auth-wrapper">
    <div class="auth-card">

      <!-- Logo -->
      <a href="index.html" class="auth-logo">
        <img src="assets/logo.png" alt="SteriFlow" style="width:38px;height:38px;border-radius:6px" />
        <span>SteriFlow</span>
      </a>
      <p class="auth-subtitle">Sign in to access the monitoring dashboard</p>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Login</button>
        <button class="auth-tab" data-tab="register">Register</button>
      </div>

      <!-- Message (error/success) -->
      <div class="auth-message" role="alert">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span class="auth-msg-text"></span>
      </div>

      <!-- ═══ LOGIN PANEL ═══ -->
      <div class="auth-panel active" id="panel-login">
        <form id="loginForm" novalidate>
          <div class="auth-field">
            <label class="auth-label" for="loginEmail">Email</label>
            <div class="auth-input-wrap">
              <input class="auth-input" type="email" id="loginEmail" placeholder="name@email.com" autocomplete="email" required />
              <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="3"/><path d="M2 8l10 6 10-6"/></svg>
            </div>
          </div>

          <div class="auth-field">
            <label class="auth-label" for="loginPassword">Password</label>
            <div class="auth-input-wrap">
              <input class="auth-input" type="password" id="loginPassword" placeholder="Enter password" autocomplete="current-password" required />
              <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              <button type="button" class="auth-toggle-pw" aria-label="Toggle password visibility">
                <svg class="eye-open" viewBox="0 0 24 24" style="display:block"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12Z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="eye-closed" viewBox="0 0 24 24" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><path d="M14.12 14.12A3 3 0 1 1 9.88 9.88"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
          </div>

          <button type="submit" class="auth-submit">
            <span class="auth-btn-text">Sign In</span>
            <div class="auth-spinner"></div>
            <svg viewBox="0 0 24 24" class="auth-btn-text"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
          </button>
        </form>

        <div class="auth-divider">
          <span>or continue with</span>
        </div>

        <button class="auth-google" type="button">
          <svg viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1Z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23Z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 0 0 1 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84Z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53Z" fill="#EA4335"/>
          </svg>
          Sign in with Google
        </button>
      </div>

      <!-- ═══ REGISTER PANEL ═══ -->
      <div class="auth-panel auth-panel-register" id="panel-register">
        <form id="registerForm" novalidate>
          <div class="auth-field auth-field-name">
            <label class="auth-label" for="registerName">Full Name</label>
            <div class="auth-input-wrap">
              <input class="auth-input" type="text" id="registerName" placeholder="Full name" autocomplete="name" required />
              <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a6 6 0 0 1 6-6h4a6 6 0 0 1 6 6v1"/></svg>
            </div>
          </div>

          <div class="auth-field">
            <label class="auth-label" for="registerEmail">Email</label>
            <div class="auth-input-wrap">
              <input class="auth-input" type="email" id="registerEmail" placeholder="name@email.com" autocomplete="email" required />
              <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="3"/><path d="M2 8l10 6 10-6"/></svg>
            </div>
          </div>

          <div class="auth-field">
            <label class="auth-label" for="registerPassword">Password</label>
            <div class="auth-input-wrap">
              <input class="auth-input" type="password" id="registerPassword" placeholder="Minimum 6 characters" autocomplete="new-password" required />
              <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              <button type="button" class="auth-toggle-pw" aria-label="Toggle password visibility">
                <svg class="eye-open" viewBox="0 0 24 24" style="display:block"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12Z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="eye-closed" viewBox="0 0 24 24" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><path d="M14.12 14.12A3 3 0 1 1 9.88 9.88"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
          </div>

          <button type="submit" class="auth-submit">
            <span class="auth-btn-text">Sign Up</span>
            <div class="auth-spinner"></div>
            <svg viewBox="0 0 24 24" class="auth-btn-text"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
          </button>
        </form>

        <div class="auth-divider">
          <span>or continue with</span>
        </div>

        <button class="auth-google" type="button">
          <svg viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1Z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23Z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 0 0 1 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84Z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53Z" fill="#EA4335"/>
          </svg>
          Sign up with Google
        </button>
      </div>

      <!-- Footer -->
      <div class="auth-footer">
        <a href="index.html">Back to Home</a>
      </div>

    </div>
  </div>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
